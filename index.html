<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kele-arabe | l'Arabe Facile</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&family=Amiri&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1b4332;
            --accent: #d4a373;
            --bg: #f8f9fa;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg);
            color: #2d3436;
            line-height: 1.6;
        }

        /* Barre de navigation */
        header {
            background: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        .logo span { color: var(--accent); }

        /* Hero */
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary), #2d6a4f);
            color: white;
            border-radius: 0 0 40px 40px;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* Grille de niveaux */
        .levels { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        /* Liste des PDF (Vue débutant) */
        #beginner-view { display: none; }
        .pdf-item {
            background: white; margin-bottom: 10px; padding: 15px;
            border-radius: 12px; display: flex; align-items: center; 
            cursor: pointer; transition: 0.2s; border-right: 5px solid var(--accent);
        }
        .pdf-item:hover { background: #e8f5e9; }
        .pdf-icon { font-size: 1.5rem; margin-left: 15px; }

        /* --- LECTEUR PDF (MODAL) --- */
        #pdf-modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 2000;
        }
        .modal-content {
            position: relative; width: 95%; height: 90%; 
            margin: 2% auto; background: white; border-radius: 10px; overflow: hidden;
        }
        .close-modal {
            position: absolute; top: 10px; left: 10px;
            background: red; color: white; border: none;
            padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .btn-back { margin-bottom: 20px; cursor: pointer; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">kele-<span>arabe</span></div>
    </header>

    <main class="container">
        
        <!-- VUE ACCUEIL -->
        <div id="main-view">
            <section class="hero">
                <h1>Apprenez l'Arabe</h1>
                <p>Niveau Débutant : Livrets PDF inclus</p>
            </section>

            <div class="levels">
                <div class="card" onclick="showBeginner()">
                    <span style="font-size:3rem">🌱</span>
                    <h2>Débutants</h2>
                    <p>Accéder aux livrets de cours</p>
                </div>
                <div class="card" style="opacity:0.6; cursor:not-allowed">
                    <span style="font-size:3rem">🌿</span>
                    <h2>Intermédiaire</h2>
                    <p>Bientôt disponible</p>
                </div>
            </div>
        </div>

        <!-- VUE LISTE PDF -->
        <div id="beginner-view">
            <div class="btn-back" onclick="goHome()">← Retour à l'accueil</div>
            <h2 style="margin-bottom:20px">Mes Livrets (PDF)</h2>
            
            <!-- LISTE DES LEÇONS -->
            <div class="pdf-item" onclick="viewPDF('pdfs/livre1.pdf')">
                <div class="pdf-icon">📕</div>
                <div><strong>Leçon 1 :</strong> Introduction et Alphabet</div>
            </div>

            <div class="pdf-item" onclick="viewPDF('pdfs/livre2.pdf')">
                <div class="pdf-icon">📘</div>
                <div><strong>Leçon 2 :</strong> Salutations et Pronoms</div>
            </div>

            <div class="pdf-item" onclick="viewPDF('pdfs/livre3.pdf')">
                <div class="pdf-icon">📗</div>
                <div><strong>Leçon 3 :</strong> Vocabulaire de base</div>
            </div>
        </div>

    </main>

    <!-- FENÊTRE DU LECTEUR PDF -->
    <div id="pdf-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closePDF()">FERMER ✖</button>
            <iframe id="pdf-frame" src=""></iframe>
        </div>
    </div>

    <script>
        function showBeginner() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('beginner-view').style.display = 'block';
        }

        function goHome() {
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('beginner-view').style.display = 'none';
        }

        // Fonction pour afficher le PDF dans la page
        function viewPDF(fileUrl) {
            const modal = document.getElementById('pdf-modal');
            const frame = document.getElementById('pdf-frame');
            
            // Sur mobile, certains navigateurs bloquent l'affichage direct. 
            // On utilise le lecteur Google Docs en secours pour garantir l'affichage
            const viewerUrl = `https://docs.google.com/viewer?url=${window.location.origin}/${fileUrl}&embedded=true`;
            
            frame.src = fileUrl; // Essai direct
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Bloque le scroll derrière
        }

        function closePDF() {
            document.getElementById('pdf-modal').style.display = 'none';
            document.getElementById('pdf-frame').src = "";
            document.body.style.overflow = 'auto';
        }

        // Service Worker pour PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
